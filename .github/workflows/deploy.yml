name: Deploy
on:
  push:
    branches: [main]
  repository_dispatch:
    types: [vault-updated]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ghostleek/tabelog-vault
          token: ${{ secrets.VAULT_PAT }}
          path: vault

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Restore embeddings cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: embeddings-${{ github.run_id }}
          restore-keys: embeddings-

      - name: Build (sync vault → search index → astro → privacy tripwire)
        run: npm run build
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name tabelog
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
